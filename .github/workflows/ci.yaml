name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Run tests
        run: go test ./... -race -count=1 -coverprofile=coverage.out -coverpkg=./...

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: coverage.out
        continue-on-error: true

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.11.4

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [darwin, linux]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: go build -ldflags="-s -w" ./cmd/memoria/

  vulncheck:
    name: Vulnerability Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: |
          # Run govulncheck in JSON format so we can filter known-accepted vulns.
          # GO-2026-4923: bbolt vulnerability with no fix available (transitive via bleve).
          # Remove the ID from this list once a fix is released.
          ACCEPTED_VULNS="GO-2026-4923"

          set +e
          output=$(govulncheck -format json ./... 2>&1)
          exit_code=$?
          set -e

          if [ $exit_code -eq 0 ]; then
            echo "No vulnerabilities found."
            exit 0
          fi

          # Extract vulnerability IDs from JSON output
          found_vulns=$(echo "$output" | grep -o '"id":"GO-[^"]*"' | sed 's/"id":"//;s/"//' | sort -u)

          has_new=false
          for vuln in $found_vulns; do
            if echo "$ACCEPTED_VULNS" | grep -qw "$vuln"; then
              echo "::warning::Accepted vulnerability (no fix available): $vuln"
            else
              echo "::error::New vulnerability found: $vuln"
              has_new=true
            fi
          done

          if [ "$has_new" = true ]; then
            echo "$output"
            exit 1
          fi

          echo "Only accepted vulnerabilities found (no fix available)."
