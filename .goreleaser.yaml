version: 2

project_name: memoria

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1

builds:
  - main: ./cmd/memoria
    binary: memoria
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

brews:
  - repository:
      owner: cassiomarques
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/cassiomarques/memoria"
    description: "A terminal-based note-taking app with full-text search, git sync, and a TUI"
    license: "MIT"
    install: |
      bin.install "memoria"
    test: |
      system "#{bin}/memoria", "--version"
