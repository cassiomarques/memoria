version: "2"

linters:
  enable:
    - errcheck        # unchecked errors
    - govet           # go vet on steroids
    - staticcheck     # comprehensive static analysis
    - unused          # unused code
    - gosimple        # simplification suggestions
    - ineffassign     # useless assignments
    - typecheck       # type checking
    - gocritic        # opinionated linter with many checks
    - misspell        # spelling mistakes in comments/strings
    - prealloc        # slice preallocation hints
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters
    - nilerr          # returning nil after checking error
    - errorlint       # error wrapping best practices
    - bodyclose       # HTTP response body close
    - durationcheck   # bad time.Duration multiplications
    - exportloopref   # loop variable capture bugs

formatters:
  enable:
    - gofmt           # standard formatting
    - goimports       # import ordering

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam  # we pass structs by value in Bubble Tea (by design)

issues:
  exclude-dirs:
    - dist
  exclude-rules:
    # Test files can have longer functions and unused params
    - path: _test\.go
      linters:
        - unparam
        - gocritic
