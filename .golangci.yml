version: "2"

linters:
  enable:
    - errcheck        # unchecked errors
    - govet           # go vet on steroids
    - staticcheck     # comprehensive static analysis (includes gosimple)
    - unused          # unused code
    - ineffassign     # useless assignments
    - gocritic        # opinionated linter with many checks
    - misspell        # spelling mistakes in comments/strings
    - prealloc        # slice preallocation hints
    - unconvert       # unnecessary type conversions
    - unparam         # unused function parameters
    - nilerr          # returning nil after checking error
    - errorlint       # error wrapping best practices
    - bodyclose       # HTTP response body close
    - durationcheck   # bad time.Duration multiplications
  settings:
    gocritic:
      enabled-tags:
        - diagnostic
        - performance
      disabled-checks:
        - hugeParam  # we pass structs by value in Bubble Tea (by design)
  exclusions:
    rules:
      # Test files: allow unchecked errors, unused params, gocritic nits
      - path: _test\.go
        linters:
          - errcheck
          - unparam
          - gocritic
      # Intentional misspellings in fuzzy search tests
      - path: _test\.go
        linters:
          - misspell
      # defer cleanup calls — ignoring Close/Remove errors is idiomatic
      - source: "defer "
        linters:
          - errcheck
      # t.Cleanup funcs — ignoring Close errors is fine
      - source: "t\\.Cleanup"
        linters:
          - errcheck

formatters:
  enable:
    - gofmt           # standard formatting
    - goimports       # import ordering
  exclusions:
    paths:
      - dist
